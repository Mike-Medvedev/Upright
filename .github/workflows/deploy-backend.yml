name: Deploy Backend

on:
  push:
    branches:
      - main
    paths:
      - "backend/**"
      - ".github/workflows/deploy-backend.yml"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: deploy-backend
  cancel-in-progress: true

env:
  IMAGE_NAME: medvedvil/upright-backend

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Log in to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: medvedvil
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Compute image tag
        id: image
        run: echo "image=${{ env.IMAGE_NAME }}:${{ github.sha }}" >> "$GITHUB_OUTPUT"

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: |
            ${{ steps.image.outputs.image }}
            ${{ env.IMAGE_NAME }}:latest

      - name: Install Azure Container Apps extension
        run: az extension add --name containerapp --upgrade

      - name: Deploy backend container app
        run: >
          az containerapp update
          --name "${{ vars.AZURE_BACKEND_CONTAINER_APP_NAME }}"
          --resource-group "${{ vars.AZURE_RESOURCE_GROUP }}"
          --image "${{ steps.image.outputs.image }}"
