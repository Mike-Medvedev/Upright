name: Deploy Frontend

on:
  push:
    branches:
      - main
    paths:
      - "frontend/**"
      - ".github/workflows/deploy-frontend.yml"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: deploy-frontend
  cancel-in-progress: true

env:
  IMAGE_NAME: medvedevil/upright-frontend

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Log in to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: medvedevil
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          build-args: |
            VITE_API_URL=${{ secrets.VITE_API_URL }}
            VITE_SUPABASE_URL=${{ secrets.VITE_SUPABASE_URL }}
            VITE_SUPABASE_PUBLISHABLE_DEFAULT_KEY=${{ secrets.VITE_SUPABASE_PUBLISHABLE_DEFAULT_KEY }}
            VITE_ROBOFLOW_WORKSPACE_NAME=${{ secrets.VITE_ROBOFLOW_WORKSPACE_NAME }}
            VITE_ROBOFLOW_WORKFLOW_ID=${{ secrets.VITE_ROBOFLOW_WORKFLOW_ID }}
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ github.sha }}

      - name: Install Azure Container Apps extension
        run: az extension add --name containerapp --upgrade

      - name: Deploy frontend container app
        run: >
          az containerapp update
          --name "${{ vars.AZURE_FRONTEND_CONTAINER_APP_NAME }}"
          --resource-group "${{ vars.AZURE_RESOURCE_GROUP }}"
          --image "${{ env.IMAGE_NAME }}:${{ github.sha }}"
